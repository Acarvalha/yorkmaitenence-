<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <title>Staff Dashboard</title>
</head>
<body>
    <nav class=custom-nav text-white>
        <div class=nav-container>
            <span class=nav-title>Maintenance System</span>
            <div class=nav-links>
                <a href=submit-request.html>Submit</a>
                <a href=account-info.html>Account</a>
                <a href=login.html>Logout</a>
            </div>
        </div>
    </nav>

    <div class=header>STAFF DASHBOARD</div>

    <div class="container mt-4">
        <div class=row>
            <div class=col-md-9>
                <h5 class="fw-bold mb-3">UPDATE REQUEST STATUS</h5>
                
                <div class="row mb-4">
                    <div class=col-md-7>
                        <div class=borderbox>
                            <div class=greyhead>UPDATE REQUEST STATUS</div>
                            <div class=p-3>
                                <label class="small fw-bold mb-1">RESOLUTION NOTES</label>
                                <textarea class=form-control rows=3 placeholder="ENTER NOTE DETAILS"></textarea>
                            </div>
                        </div>
                        <button class="redbtn mt-2">SAVE UPDATES</button>
                    </div>

                    <div class="col-md-5 text-center d-flex flex-column align-items-center">
                        <label class="small fw-bold mb-2">UPDATE STATUS</label>
                        <button class=redbtn>CHANGE STATUS</button>
                        <h4 class="mt-5 fw-bold">ADMIN DASHBOARD</h4>
                    </div>
                </div>

                <div class=borderbox>
                    <div class="greyhead text-center">Assigned requests</div>
                    <div class=table-responsive>
                        <table class="table mb-0 table-bordered border-dark">
                            <thead class=table-light>
                                <tr>
                                    <th>Request ID</th>
                                    <th>Category</th>
                                    <th>Priority</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr><td>REQ-124</td><td>IT</td><td>High</td><td>In progress</td></tr>
                                <tr><td>REQ-125</td><td>IT</td><td>Low</td><td>Submitted</td></tr>
                                <tr><td>REQ-221</td><td>Electrical</td><td>High</td><td>In progress</td></tr>
                                <tr><td>REQ-323</td><td>Plumbing</td><td>Low</td><td>Submitted</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class=col-md-3>
                <div class=rightside>
                    <h6 class=fw-bold>Navigation Bar</h6>
                    <button class=navbtn>STAFF DASH BOARD</button>
                    <button class=navbtn>REQUEST STATUS</button>
                    <button class=navbtn>ADMIN DASHBOARD</button>
                    <button class=navbtn>SUBMIT REQUEST</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
