<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />

    <title>Register</title>
  </head>
  <body>
    <nav class="custom-nav">
      <div class="nav-container">
        <span class="nav-title">Maintenance System</span>

        <div class="nav-links">
          <!--<a href="my-requests.html">My Requests</a> -->
          <!--<a href="staff-dashboard.html"></a> -->
          <!--<a href="admin.dashboard.html"></a> -->
          <a href="submit-request.html">Submit</a>
          <a href="account-info.html">Account</a>
          <a href="login.html">Logout</a>
        </div>
      </div>
    </nav>

    <!-- HEADER -->
    <div class="header">Create Account</div>

    <!-- FORM -->
    <div class="container d-flex justify-content-center">
      <div class="form-card">
        <h4 class="text-center mb-4">Registration</h4>

        <form onsubmit="handleRegister(event)">
          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" required />
          </div>

          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" required />
          </div>

          <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" class="form-control" required />
          </div>

          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" required />
          </div>

          <div class="mb-3">
            <label class="form-label">Confirm Password</label>
            <input type="password" class="form-control" required />
          </div>

          <div class="form-check mb-3">
            <input type="checkbox" class="form-check-input" required />
            <label class="form-check-label">
              I agree to the Terms and Conditions
            </label>
          </div>

          <button type="submit" class="btn btn-primary w-100">Register</button>
        </form>

        <p class="text-center mt-3">
          Already have an account?
          <a href="login.html">Login here</a>
        </p>
      </div>
    </div>

    <script>
      function handleRegister(e) {
        e.preventDefault();
        alert("Account created successfully!");
        window.location.href = "login.html";
      }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
