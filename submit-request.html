<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />

    <title>Submit Maintenance Request</title>
  </head>
  <body>
    <!--Navigation  Bar-->
    <nav class="navbar navbar-expand-lg navbar-dark bg-danger px-3">
      <a class="navbar-brand fw-bold" href="#">Maintenance Request System</a>

      <!-- HAMBURGER BUTTON -->
      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarNav"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- COLLAPSIBLE MENU -->
      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" href="my-requests.html">My Requests</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="account-info.html">Account</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="login.html">Logout</a>
          </li>
        </ul>
      </div>
    </nav>

    <!-- MAIN CONTAINER -->
    <div class="container py-5">
      <div class="request-wrapper mx-auto" style="max-width: 400px">
        <div
          id="successMsg"
          class="alert alert-success m-3 mb-0"
          style="display: none"
        >
          Request submitted successfully.
        </div>

        <!-- HEADER -->
        <div class="greyhead text-center">SUBMIT MAINTENANCE REQUEST</div>

        <!-- FORM -->
        <form class="p-3" onsubmit="handleSubmitRequest(event)">
          <!-- ISSUE CATEGORY -->
          <div class="mb-3">
            <label class="form-label fw-bold">ISSUE CATEGORY</label>
            <select class="form-control" required>
              <option selected disabled value="">Select category</option>
              <option>Plumbing</option>
              <option>Electrical</option>
              <option>IT</option>
              <option>HVAC</option>
            </select>
          </div>

          <!-- CAMPUS -->
          <div class="mb-3">
            <label class="form-label fw-bold">CAMPUS</label>
            <select class="form-control" required>
              <option selected disabled value="">Select campus</option>
              <option>Keele</option>
              <option>Glendon</option>
              <option>Markham</option>
            </select>
          </div>

          <!-- BUILDING -->
          <div class="mb-3">
            <label class="form-label fw-bold">BUILDING</label>
            <select class="form-control" required>
              <option selected disabled value="">Select building</option>
              <option>Vari Hall</option>
              <option>Curtis Lecture Hall</option>
              <option>Accolade West</option>
              <option>Accolade East</option>
            </select>
          </div>

          <!-- ROOM -->
          <div class="mb-3">
            <label class="form-label fw-bold">ROOM (OPTIONAL)</label>
            <input
              type="text"
              class="form-control"
              placeholder="e.g. 204 or Lab B12"
            />
          </div>

          <!-- DESCRIPTION -->
          <div class="mb-3">
            <label class="form-label fw-bold">DESCRIPTION</label>
            <textarea
              class="form-control"
              rows="4"
              placeholder="Describe the issue in detail..."
              required
            ></textarea>
          </div>

          <!-- SUBMIT BUTTON -->
          <button type="submit" class="btn btn-primary w-100 mt-2">
            SUBMIT REQUEST
          </button>
        </form>
      </div>
    </div>

    <script>
      function handleSubmitRequest(event) {
        event.preventDefault();

        const form = event.target;
        const successMsg = document.getElementById("successMsg");

        successMsg.style.display = "block";
        form.reset();
        successMsg.scrollIntoView({ behavior: "smooth", block: "center" });
      }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
