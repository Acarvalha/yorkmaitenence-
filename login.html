<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />

    <title>Login</title>
  </head>
  <body>
    <!--Navigation Bar-->
    <nav class="custom-nav">
      <div class="nav-container">
        <span class="nav-title">Maintenance System</span>

        <div class="nav-links">
          <!--<a href="my-requests.html">My Requests</a> -->
          <a href="Staffdashboard.html"></a>
          <!--<a href="admin-dashboard.html"></a> -->
          <a href="submit-request.html">Submit</a>
          <a href="account-info.html">Account</a>
          <a href="login.html" class="logout-btn">Logout</a>
        </div>
      </div>
    </nav>

    <!-- HEADER -->
    <div class="header">Login</div>

    <!-- FORM -->
    <div class="container d-flex justify-content-center">
      <div class="form-card">
        <h4 class="text-center mb-4">Welcome Back</h4>

        <!-- ERROR MESSAGE -->
        <div id="errorMsg" class="alert alert-danger" style="display: none">
          Invalid email or password
        </div>

        <form onsubmit="handleLogin(event)">
          <div class="mb-3">
            <label>Email</label>
            <input type="email" class="form-control" id="email" required />
          </div>

          <div class="mb-3">
            <label>Password</label>
            <input
              type="password"
              class="form-control"
              id="password"
              required
            />
          </div>

          <!-- ROLE -->
          <div class="mb-3">
            <label>Login as</label>
            <select class="form-control" id="role" required>
              <option value="">Select role</option>
              <option value="user">User</option>
              <option value="staff">Staff</option>
              <option value="admin">Admin</option>
            </select>
          </div>

          <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>

        <!-- DEMO INFO -->
        <div class="text-center mt-3 p-2 bg-light rounded">
          <small class="text-muted">
            Demo email: <strong>demo@yoku.ca</strong> / password:
            <strong>password@york</strong>
          </small>
        </div>

        <!-- LINK -->
        <p class="text-center mt-3">
          Don’t have an account?
          <a href="register.html">Register</a>
        </p>
      </div>
    </div>

    <!-- SCRIPT -->
    <script>
      function handleLogin(e) {
        e.preventDefault();

        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const role = document.getElementById("role").value;
        const errorMsg = document.getElementById("errorMsg");

        if (email === "demo@yorku.ca" && password === "password@york") {
          // store user info
          localStorage.setItem("userEmail", email);
          localStorage.setItem("userName", email.split("@")[0]);

          // redirect to different pages based on role
          if (role === "user") {
            window.location.href = "my-requests.html";
          } else if (role === "staff") {
            window.location.href = "staff-dashboard.html";
          } else if (role === "admin") {
            window.location.href = "admin-dashboard.html";
          } else {
            alert("Please select a role");
          }
        } else {
          errorMsg.style.display = "block";
        }
      }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
