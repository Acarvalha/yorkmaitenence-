<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />

    <title>Login</title>
  </head>
  <body>
    <!--Navigation Bar-->

    <nav class="navbar navbar-dark bg-danger px-3">
      <a class="navbar-brand fw-bold" href="#">Maintenance Request System</a>

      <!-- HAMBURGER BUTTON -->
      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarNav"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- COLLAPSIBLE MENU -->
      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" href="login.html">Login</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="register.html">Register</a>
          </li>
        </ul>
      </div>
    </nav>

    <!-- HEADER -->
    <

    <!-- FORM -->
    <div class="container d-flex justify-content-center">
      <div class="form-card">
        <h4 class="text-center mb-4">Welcome Back</h4>

        <!-- ERROR MESSAGE -->
        <div id="errorMsg" class="alert alert-danger" style="display: none">
          Invalid email or password
        </div>

        <form onsubmit="handleLogin(event)">
          <div class="mb-3">
            <label>Email</label>
            <input type="email" class="form-control" id="email" required />
          </div>

          <div class="mb-3">
            <label>Password</label>
            <input
              type="password"
              class="form-control"
              id="password"
              required
            />
          </div>

          <!-- ROLE -->
          <div class="mb-3">
            <label>Login as</label>
            <select class="form-control" id="role" required>
              <option value="">Select role</option>
              <option value="user">User</option>
              <option value="staff">Staff</option>
              <option value="admin">Admin</option>
            </select>
          </div>

          <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>

        <!-- DEMO INFO -->
        <div class="text-center mt-3 p-2 bg-light rounded">
          <small class="text-muted">
            Demo email: <strong>demo@yoku.ca</strong> / password:
            <strong>password@york</strong>
          </small>
        </div>

        <!-- LINK -->
        <p class="text-center mt-3">
          Don’t have an account?
          <a href="register.html">Register</a>
        </p>
      </div>
    </div>

    <!-- SCRIPT -->
    <script>
      function handleLogin(e) {
        e.preventDefault();

        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const role = document.getElementById("role").value;
        const errorMsg = document.getElementById("errorMsg");

        if (email === "demo@yorku.ca" && password === "password@york") {
          // store user info
          localStorage.setItem("userEmail", email);
          localStorage.setItem("userRole", role);

          // redirect to different pages based on role
          if (role === "user") {
            localStorage.setItem("userName", "Hana Smith");
            window.location.href = "ongoing.html";
          } else if (role === "staff") {
            localStorage.setItem("userName", "Alex Brown");
            window.location.href = "staff-dashboard.html";
          } else if (role === "admin") {
            localStorage.setItem("userName", "Jordan Lee");
            window.location.href = "admin-dashboard.html";
          } else {
            alert("Please select a role");
          }
        } else {
          errorMsg.style.display = "block";
        }
      }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
